<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SELA Voice Assistant</title>

  <link rel="stylesheet" href="styles.css" />

  <style>
    .chat-panel{
      width: 340px;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 10px;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 14px;
      box-sizing: border-box;
    }

    .panel-title{
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
      color: #ffffff;
    }

    .reply-bubble{
      padding: 10px;
      border-radius: 14px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 22px;
    }

    body, html {
      width:100%;
      height:100%;
      margin:0;
      background:#2f2f2f;
      color:#fff;
      overflow:hidden;
    }

    .background-animation {
      position:fixed;
      inset:0;
      overflow:hidden;
      z-index:0;
    }

    .circle {
      position:absolute;
      border-radius:50%;
      filter: blur(0px);
      opacity:0.25;
    }

    .circle1 {
      width:380px;
      height:380px;
      left:-80px;
      top:-80px;
      background:#6bd4ff;
    }

    .circle2 {
      width:420px;
      height:420px;
      right:-120px;
      top:80px;
      background:#b06bff;
    }

    .circle3 {
      width:520px;
      height:520px;
      left:30%;
      bottom:-220px;
      background:#6bffb7;
    }

    .user-info {
      position:absolute;
      top:14px;
      right:16px;
      z-index:2;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .logout-btn {
      cursor:pointer;
      border:1px solid rgba(255,255,255,.25);
      background:rgba(0,0,0,.25);
      color:#fff;
      padding:8px 12px;
      border-radius:12px;
    }

    .main-container {
      position:relative;
      z-index:1;
      display:flex;
      gap:18px;
      padding:70px 18px 90px;
      height:100%;
      box-sizing:border-box;
    }

    .webcam-container {
      flex: 1;
      position: relative;
    }

    .avatar-container {
      flex:2.5;
      height: 500px;
      position:relative;
      border:1px solid rgba(255,255,255,.15);
      border-radius:18px;
      overflow:hidden;
      background:rgba(0,0,0,.20);
      min-height:420px;
    }

    #webcamFeed,
    #recordPreview {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    #faceCanvas {
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .control-btn {
      cursor:pointer;
      border:1px solid rgba(255,255,255,.25);
      background:rgba(0,0,0,.25);
      color:#fff;
      padding:10px 12px;
      border-radius:14px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .control-btn:hover {
      background:rgba(255,255,255,.08);
    }

    .camera-btn {
      position:absolute;
      top:10px;
      left:10px;
      z-index:2;
    }

    .icon {
      width:22px;
      height:22px;
    }

    .bottom-controls {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index:2;
      display:flex;
      justify-content:center;
    }

    .status-bar {
      display:flex;
      gap:10px;
      align-items:center;
      padding:10px 14px;
      border-radius:16px;
      background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.15);
      backdrop-filter: blur(8px);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .status-dot {
      width:10px;
      height:10px;
      border-radius:50%;
      background:#ffcc00;
    }

    .control-buttons {
      position:absolute;
      left:0;
      right:0;
      bottom:12px;
      z-index:2;
      display:flex;
      gap:10px;
      justify-content:center;
    }

    #avatar3DWrap {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: hidden;
    }

    #avatar3D {
      width: 100%;
      height: 100%;
      transform: translateX(0px) translateY(-200px) scale(1.4);
      transform-origin: top center;
    }

    #avatarLoading {
      position:absolute;
      left:12px;
      bottom:12px;
      z-index:3;
      padding:8px 10px;
      border-radius:12px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.18);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 14px;
    }

    .chat-holder {
      position: fixed;
      left: 14px;
      bottom: 14px;
      z-index: 9999;
      cursor: grab;
      user-select: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 360px;
    }

    .chat-holder.dragging {
      cursor: grabbing;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",

</head>

<body>
  <div class="background-animation">
    <div class="circle circle1"></div>

  <div class="user-info">

  <div class="control-buttons">
    <button class="control-btn mic-btn" id="micToggle" title="Microphone used only during recording">MIC</button>
    <button class="control-btn camera-btn" id="cameraToggleBottom" title="Toggle Camera">CAM</button>
    <button class="control-btn" id="recordUploadBtn" title="Start listening" style="font-weight:600;">REC</button>
    <button class="control-btn" id="testBtn" title="Test Backend" style="font-weight:600;">TEST</button>

<script type="module">
import { TalkingHead } from "talkinghead";

const USE_SSH_TUNNEL = true;
const SERVER_VPN_HOST = "10.20.30.40";

const API_BASE = USE_SSH_TUNNEL
  ? "http://localhost:8891"
  : `http://${SERVER_VPN_HOST}:8891`;

const WS_BASE = API_BASE.replace(/^http/i, "ws");
const RECORD_USER_ID = "dhanuja";

const VAD_THRESHOLD = 18;
const VAD_SILENCE_MS = 1200;
const MEDIARECORDER_TIMESLICE = 300;

const TTS_API_KEY = "AIzaSyCKfTrIauXxhZ-eIffqW0hFpCTnq97t9mo";
const AVATAR_GLB_URL = "/avatar/assets/harry.glb";
const HARD_CODED_MOOD = "neutral";

let cachedVideoStream = null;
let head = null;
let isAvatarSpeaking = false;
let isCameraEnabled = true;

let currentAvatarState = "idle";
let currentEmotion = "neutral";
let subtleGestureTimer = null;
let idleLoopTimer = null;

let streamSocket = null;
let activeMicStream = null;
let activeRecordStream = null;
let activeRecorder = null;
let activeAudioContext = null;
let activeAnalyser = null;
let activeSourceNode = null;
let vadInterval = null;
let speechStarted = false;
let stopRequested = false;
let sessionRunning = false;
let turnRunning = false;
let lastSpeechTime = 0;

let streamedAgentText = "";
let currentReplyMeta = null;
let avatarMetaApplied = false;

const nodeLoading = document.getElementById("avatarLoading");

function setStatusText(msg) {
  const el = document.getElementById("statusMessage");
  if (el) el.textContent = msg;
}

function setDot(ok) {
  const dot = document.getElementById("statusDot");
  if (!dot) return;
  dot.style.background = ok ? "#34d399" : "#ff4d4d";
}

function sleep(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

function showSystemMessage(text) {
  const el = document.getElementById("chatOther");
  if (el) el.textContent = String(text ?? "");
}

function showOtherData(data) {
  const el = document.getElementById("chatOther");
  if (!el) return;

  if (typeof data === "string") {
    el.textContent = data;
    return;
  }

  try {
    el.textContent = JSON.stringify(data, null, 2);
  } catch {
    el.textContent = String(data);
  }
}

function parseServerResponse(raw) {
  if (!raw) return {};
  if (typeof raw === "object") return raw;

  try {
    return JSON.parse(raw);
  } catch {}

  const data = {};
  const lines = String(raw).split(/\r?\n/);

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;

    const firstComma = trimmed.indexOf(",");
    if (firstComma === -1) continue;

    const key = trimmed.slice(0, firstComma).trim();
    let value = trimmed.slice(firstComma + 1).trim();

    if (value.startsWith("\"") && value.endsWith("\"")) {
      value = value.slice(1, -1);
    }

    data[key] = value;
  }

  return data;
}

function showStructuredPanels(parsed) {
  document.getElementById("chatAgent").textContent =
    parsed?.agent_response ?? "No agent response";

  document.getElementById("chatEmotion").textContent =
    parsed?.avatar_emotion ?? parsed?.emotion ?? "-";

  document.getElementById("chatGesture").textContent =
    parsed?.mixamo_gesture ?? "-";

  const other = { ...parsed };
  delete other.agent_response;
  delete other.avatar_emotion;
  delete other.mixamo_gesture;
  showOtherData(other);
}

function resetStreamingReplyUI() {
  streamedAgentText = "";
  currentReplyMeta = null;
  avatarMetaApplied = false;

  //document.getElementById("chatAgent").textContent = "";
  //document.getElementById("chatEmotion").textContent = "-";
  //document.getElementById("chatGesture").textContent = "-";
}

async function applyReplyMetaOnce(meta) {
  if (!meta || avatarMetaApplied) return;

  currentReplyMeta = {
    avatar_emotion: String(meta.avatar_emotion || "neutral"),
    mixamo_gesture: String(meta.mixamo_gesture || "None"),
  };

  document.getElementById("chatEmotion").textContent = currentReplyMeta.avatar_emotion;
  document.getElementById("chatGesture").textContent = currentReplyMeta.mixamo_gesture;

  await setAvatarEmotion(currentReplyMeta.avatar_emotion);

  if (String(currentReplyMeta.mixamo_gesture).toLowerCase() !== "none") {
    await playAvatarGesture(currentReplyMeta.mixamo_gesture, 1.25);
  }

  avatarMetaApplied = true;
}

function appendStreamingReplyText(chunk, fullText) {
  if (typeof fullText === "string" && fullText.length) {
    streamedAgentText = fullText;
  } else {
    streamedAgentText += String(chunk || "");
  }

  document.getElementById("chatAgent").textContent = streamedAgentText;
}

async function finalizeStreamingReplyAndSpeak(resultMessage) {
  const finalText =
    resultMessage?.agent_response?.trim?.() ||
    streamedAgentText.trim() ||
    "Sorry, I couldn't understand.";

  const finalEmotion =
    resultMessage?.avatar_emotion ||
    currentReplyMeta?.avatar_emotion ||
    "neutral";

  const finalGesture =
    resultMessage?.mixamo_gesture ||
    currentReplyMeta?.mixamo_gesture ||
    "None";

  document.getElementById("chatAgent").textContent = finalText;
  document.getElementById("chatEmotion").textContent = finalEmotion;
  document.getElementById("chatGesture").textContent = finalGesture;

  await setAvatarEmotion(finalEmotion);
  await speakWithAvatar(finalText);
}

async function unlockAudioForChrome() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;

    const ctx = new AC();
    if (ctx.state === "suspended") {
      await ctx.resume();
    }
    await ctx.close();
  } catch (e) {
    console.warn("unlockAudioForChrome failed:", e);
  }
}

async function initVideoOnce() {
  if (cachedVideoStream) {
    const webcam = document.getElementById("webcamFeed");
    if (webcam && !webcam.srcObject) {
      webcam.srcObject = cachedVideoStream;
    }
    return cachedVideoStream;
  }

  cachedVideoStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: false
  });

  const webcam = document.getElementById("webcamFeed");
  if (webcam) webcam.srcObject = cachedVideoStream;

  const preview = document.getElementById("recordPreview");
  if (preview) preview.srcObject = cachedVideoStream;

  return cachedVideoStream;
}

async function getMicStreamForRecording() {
  return navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true
    },
    video: false
  });
}

function pickMimeType() {
  const candidates = [
    "video/webm;codecs=vp8,opus",
    "video/webm;codecs=vp9,opus",
    "video/webm"
  ];

  for (const type of candidates) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(type)) {
      return type;
    }
  }
  return "";
}

async function init3DAvatar() {
  try {
    head = new TalkingHead(document.getElementById("avatar3D"), {
      ttsEndpoint: "https://eu-texttospeech.googleapis.com/v1beta1/text:synthesize",
      ttsApikey: TTS_API_KEY,
      lipsyncModules: ["en"],
      ttsLang: "en-GB",
      ttsVoice: "en-GB-Standard-A",
      cameraView: "upper",
      cameraDistance: 1.2,
      cameraRotateEnable: false
    });

    await head.showAvatar({
      url: AVATAR_GLB_URL,
      body: "F",
      avatarMood: HARD_CODED_MOOD
    });

    if (nodeLoading) nodeLoading.style.display = "none";
    startIdleLoop();
  } catch (e) {
    console.error("init3DAvatar failed:", e);
    if (nodeLoading) nodeLoading.textContent = "Failed to load avatar";
  }
}

function stopIdleLoop() {
  if (idleLoopTimer) {
    clearInterval(idleLoopTimer);
    idleLoopTimer = null;
  }
}

function startIdleLoop() {
  stopIdleLoop();

  idleLoopTimer = setInterval(async () => {
    if (!head || isAvatarSpeaking || currentAvatarState !== "idle") return;

    try {
      await head.playGesture?.("Idle", 0.8);
    } catch {}
  }, 4000);
}

async function setConversationState(state) {
  currentAvatarState = state;

  if (state === "idle") {
    setStatusText("Ready");
    setDot(true);
    startIdleLoop();
    return;
  }

  if (state === "listening") {
    stopIdleLoop();
    setStatusText("Listening...");
    setDot(true);
    return;
  }

  if (state === "thinking") {
    stopIdleLoop();
    setStatusText("Thinking...");
    await playAvatarGesture("thinking");
    setDot(true);
    return;
  }

  if (state === "speaking") {
    stopIdleLoop();
    setStatusText("Speaking...");
    setDot(true);
  }
}

async function setAvatarEmotion(emotion) {
  currentEmotion = emotion || "neutral";

  try {
    if (!head) return;
    await head.setMood?.(currentEmotion);
  } catch (e) {
    console.warn("setAvatarEmotion failed:", e);
  }
}

function normalizeGestureName(name) {
  const g = String(name || "").trim().toLowerCase();

  if (g === "waving" || g === "wave") return "Waving";
  if (g === "nod" || g === "nodding") return "Nod";
  if (g === "thinking" || g === "think") return "Thinking";
  if (g === "agreeing" || g === "agree") return "Agreeing";
  if (g === "acknowledging" || g === "acknowledge") return "Acknowledging";
  if (g === "clap" || g === "clapping") return "Clap";
  return "None";
}

function progressUpdate(ev) {
  try {
    if (ev && typeof ev === "object" && "loaded" in ev) {
      const total = ev.total || 0;
      const pct = total ? Math.round((ev.loaded / total) * 100) : null;
      nodeLoading.textContent = pct !== null ? `Loading… ${pct}%` : "Loading…";
    } else if (typeof ev === "number") {
      nodeLoading.textContent = `Loading… ${Math.round(ev * 100)}%`;
    } else {
      nodeLoading.textContent = "Loading…";
    }
  } catch {
    nodeLoading.textContent = "Loading…";
  }
}

function getAnimationPath(gestureName) {
  if (!gestureName) return null;

  const g = String(gestureName).toLowerCase().trim();

  const gestureMap = {
    "idle": "./anims/Idle.fbx",
    "standing idle": "./anims/Standing Idle.fbx",
    "breathing idle": "./anims/Breathing Idle.fbx",
    "thinking": "./anims/Thinking.fbx",
    "acknowledging": "./anims/Acknowledging.fbx",
    "agreeing": "./anims/Agreeing.fbx",
    "weight shift": "./anims/Weight Shift.fbx",
    "wave": "./anims/Waving.fbx",
    "waving": "./anims/Waving.fbx",
    "head nod yes": "./anims/HeadNodYes.fbx",
    "nod": "./anims/HeadNodYes.fbx",
    "yes": "./anims/Head Nod Yes.fbx",
    "hard head nod": "./anims/Hard Head Nod.fbx",
    "hard nod": "./anims/Hard Head Nod.fbx",
    "clap": "./anims/Clapping.fbx",
    "none": null
  };

  return gestureMap[g] || null;
}

async function playAvatarGesture(gesture, speed = 1.2) {
  if (!head || !gesture) return;

  const normalized = normalizeGestureName(gesture);
  const animPath = getAnimationPath(normalized);

  if (!animPath) return;

  try {
    await head.playAnimation(animPath, progressUpdate, speed);
  } catch (e) {
    console.warn("Gesture failed:", e);
  }
}

function stopSubtleSpeakingGestures() {
  if (subtleGestureTimer) {
    clearInterval(subtleGestureTimer);
    subtleGestureTimer = null;
  }
}

function startSubtleSpeakingGestures() {
  stopSubtleSpeakingGestures();

  subtleGestureTimer = setInterval(async () => {
    if (!isAvatarSpeaking || !head) return;

    const candidates = [
      { name: "Acknowledging", p: 0.45 },
      { name: "Nod", p: 0.25 },
      { name: "Thinking", p: 0.20 },
      { name: "Agreeing", p: 0.10 }
    ];

    const r = Math.random();
    let acc = 0;
    let selected = null;

    for (const item of candidates) {
      acc += item.p;
      if (r <= acc) {
        selected = item.name;
        break;
      }
    }

    if (!selected) return;

    try {
      await playAvatarGesture(selected, 1.15);
    } catch (e) {
      console.warn("Subtle speaking gesture failed:", e);
    }
  }, 1600 + Math.random() * 1000);
}

async function speakWithAvatar(text) {
  try {
    if (!text || !head) return;

    isAvatarSpeaking = true;
    await setConversationState("speaking");
    stopIdleLoop();
    setStatusText("Avatar speaking...");
    startSubtleSpeakingGestures();

    await unlockAudioForChrome();
    await head.speakText(text);
  } catch (e) {
    console.warn("speakWithAvatar failed:", e);
  } finally {
    isAvatarSpeaking = false;
    stopSubtleSpeakingGestures();
  }
}

async function testBackend() {
  try {
    const r = await fetch(`${API_BASE}/health`);
    const j = await r.json();

    showSystemMessage("Health OK ✅");
    showOtherData(j);
    setStatusText("Backend reachable ✅");
    setDot(true);
  } catch (e) {
    showSystemMessage("Health FAILED ❌");
    showOtherData(e?.message || String(e));
    setStatusText("Backend not reachable ❌");
    setDot(false);
  }
}

async function toggleContinuousConversation() {
  const btn = document.getElementById("recordUploadBtn");

  if (!sessionRunning) {
    sessionRunning = true;
    stopRequested = false;

    if (btn) {
      btn.textContent = "STOP";
      btn.title = "Stop listening";
    }

    showSystemMessage("Continuous conversation started.");
    runContinuousConversationLoop();
  } else {
    stopRequested = true;
    sessionRunning = false;

    if (btn) {
      btn.textContent = "REC";
      btn.title = "Start listening";
    }

    showSystemMessage("Continuous conversation stopped.");
    await cleanupStreamingSession();
    await setConversationState("idle");
  }
}

async function runContinuousConversationLoop() {
  while (sessionRunning && !stopRequested) {
    if (isAvatarSpeaking || turnRunning) {
      await sleep(200);
      continue;
    }

    try {
      await startStreamingWithVAD();
    } catch (e) {
      console.error("Continuous loop turn failed:", e);
      showSystemMessage("Turn failed: " + (e?.message || String(e)));
      await cleanupStreamingSession();
      await setConversationState("idle");
      await sleep(500);
    }

    await sleep(250);
  }

  const btn = document.getElementById("recordUploadBtn");
  if (btn) {
    btn.textContent = "REC";
    btn.title = "Start listening";
  }
}

async function startStreamingWithVAD() {
  if (!sessionRunning || stopRequested) return;
  if (isAvatarSpeaking) return;
  if (turnRunning) return;

  try {
    turnRunning = true;
    speechStarted = false;
    lastSpeechTime = Date.now();
    resetStreamingReplyUI();

    await initVideoOnce();

    const videoTrack = cachedVideoStream?.getVideoTracks?.()[0];
    if (!videoTrack) {
      throw new Error("Camera video track not available.");
    }

    activeMicStream = await getMicStreamForRecording();
    const audioTrack = activeMicStream.getAudioTracks()[0];

    if (!audioTrack) {
      throw new Error("Microphone audio track not available.");
    }

    activeRecordStream = new MediaStream([videoTrack, audioTrack]);

    await setConversationState("listening");
    showSystemMessage("Listening... speak now");

    await new Promise((resolve, reject) => {
      let finished = false;
      let recorderStoppedOnce = false;

      streamSocket = new WebSocket(`${WS_BASE}/ws/stream`);
      streamSocket.binaryType = "arraybuffer";

      streamSocket.onopen = () => {
        try {
          streamSocket.send(`USER_ID:${RECORD_USER_ID}`);

          const mimeType = pickMimeType();
          activeRecorder = new MediaRecorder(
            activeRecordStream,
            mimeType ? { mimeType } : undefined
          );

          activeRecorder.ondataavailable = async (e) => {
            if (
              e.data &&
              e.data.size > 0 &&
              streamSocket &&
              streamSocket.readyState === WebSocket.OPEN
            ) {
              const buf = await e.data.arrayBuffer();
              streamSocket.send(buf);
            }
          };

          activeRecorder.onerror = (e) => {
            console.error("MediaRecorder error:", e);
          };

          activeRecorder.onstop = () => {
            recorderStoppedOnce = true;
          };

          activeRecorder.start(MEDIARECORDER_TIMESLICE);
          startVADLoop(activeMicStream);
        } catch (err) {
          if (!finished) {
            finished = true;
            reject(err);
          }
        }
      };

      streamSocket.onmessage = async (event) => {
        let payload = null;

        try {
          payload = JSON.parse(event.data);
        } catch {
          return;
        }

        if (payload.type === "ready") {
          setStatusText("Streaming ready ✅");
          setDot(true);
          return;
        }

        if (payload.type === "status") {
          showSystemMessage(`Server stage: ${payload.stage}`);
          return;
        }

        if (payload.type === "transcription") {
          showOtherData({ transcription: payload.text || "" });
          return;
        }

        if (payload.type === "meta") {
          try {
            await applyReplyMetaOnce(payload.data || {});
            setStatusText("Emotion and gesture set ✅");
            setDot(true);
          } catch (err) {
            console.error("Meta apply failed:", err);
          }
          return;
        }

        if (payload.type === "partial_text") {
          appendStreamingReplyText(payload.text, payload.full_text);
          setStatusText("Receiving streamed reply...");
          setDot(true);
          return;
        }

        if (payload.type === "result") {
          const result = payload.data;

          try {
            if (result?.ok && result?.message) {
              await finalizeStreamingReplyAndSpeak(result.message);
              showOtherData({
                transcription: result.transcription || "",
                timings_ms: result.timings_ms || {},
                ws_timings_ms: result.ws_timings_ms || {}
              });
              setStatusText("Reply received ✅");
              setDot(true);
            } else {
              showSystemMessage("Unexpected server response");
              showOtherData(result);
              setStatusText("Unexpected response ❌");
              setDot(false);
            }
          } catch (err) {
            console.error("Reply handling failed:", err);
          }

          await cleanupStreamingSession();
          await setConversationState("idle");

          if (!finished) {
            finished = true;
            resolve();
          }
          return;
        }

        if (payload.type === "error") {
          if (!finished) {
            finished = true;
            reject(new Error(payload.error || "WebSocket processing failed"));
          }
        }
      };

      streamSocket.onerror = () => {
        setStatusText("WebSocket error ❌");
        setDot(false);
      };

      streamSocket.onclose = async () => {
        if (finished) return;

        if (turnRunning && !recorderStoppedOnce && !stopRequested) {
          await cleanupStreamingSession();
          await setConversationState("idle");
        }

        finished = true;
        resolve();
      };
    });
  } catch (err) {
    console.error(err);
    showSystemMessage("Error: " + (err?.message || String(err)));
    showOtherData(err?.stack || "No stack trace");
    setStatusText("Error ❌");
    setDot(false);
    await cleanupStreamingSession();
    await setConversationState("idle");
    throw err;
  }
}

function startVADLoop(micStream) {
  const AC = window.AudioContext || window.webkitAudioContext;
  activeAudioContext = new AC();

  activeSourceNode = activeAudioContext.createMediaStreamSource(micStream);
  activeAnalyser = activeAudioContext.createAnalyser();
  activeAnalyser.fftSize = 2048;
  activeSourceNode.connect(activeAnalyser);

  const data = new Uint8Array(activeAnalyser.fftSize);

  vadInterval = setInterval(async () => {
    if (!activeAnalyser || !activeRecorder) return;
    if (!sessionRunning || stopRequested) return;
    if (!turnRunning) return;

    activeAnalyser.getByteTimeDomainData(data);

    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = data[i] - 128;
      sum += Math.abs(v);
    }

    const level = sum / data.length;

    if (level > VAD_THRESHOLD) {
      speechStarted = true;
      lastSpeechTime = Date.now();
      setStatusText("User speaking...");
      setDot(true);
      return;
    }

    if (speechStarted && Date.now() - lastSpeechTime > VAD_SILENCE_MS) {
      setStatusText("User stopped speaking...");
      showSystemMessage("Speech ended. Processing...");
      await stopStreamingAndFinalize();
    }
  }, 100);
}

async function stopStreamingAndFinalize() {
  try {
    if (vadInterval) {
      clearInterval(vadInterval);
      vadInterval = null;
    }

    if (activeRecorder && activeRecorder.state !== "inactive") {
      await new Promise((resolve) => {
        const originalOnStop = activeRecorder.onstop;

        activeRecorder.onstop = (...args) => {
          try {
            if (typeof originalOnStop === "function") {
              originalOnStop(...args);
            }
          } catch {}
          resolve();
        };

        activeRecorder.stop();
      });
    }

    await setConversationState("thinking");

    if (streamSocket && streamSocket.readyState === WebSocket.OPEN) {
      streamSocket.send("END");
    }
  } catch (e) {
    console.warn("stopStreamingAndFinalize failed:", e);
  }
}

async function cleanupStreamingSession() {
  if (vadInterval) {
    clearInterval(vadInterval);
    vadInterval = null;
  }

  try {
    if (activeRecorder && activeRecorder.state !== "inactive") {
      activeRecorder.stop();
    }
  } catch {}

  try {
    if (activeMicStream) {
      activeMicStream.getTracks().forEach((t) => t.stop());
    }
  } catch {}

  try {
    if (activeRecordStream) {
      activeRecordStream.getTracks().forEach((t) => {
        if (t.kind === "audio") t.stop();
      });
    }
  } catch {}

  try {
    activeSourceNode?.disconnect();
  } catch {}

  try {
    activeAnalyser?.disconnect?.();
  } catch {}

  try {
    if (activeAudioContext && activeAudioContext.state !== "closed") {
      await activeAudioContext.close();
    }
  } catch {}

  try {
    if (streamSocket && streamSocket.readyState === WebSocket.OPEN) {
      streamSocket.close();
    }
  } catch {}

  activeMicStream = null;
  activeRecordStream = null;
  activeRecorder = null;
  activeAudioContext = null;
  activeAnalyser = null;
  activeSourceNode = null;
  streamSocket = null;
  speechStarted = false;
  turnRunning = false;
}

function toggleCamera() {
  if (!cachedVideoStream) return;

  const videoTracks = cachedVideoStream.getVideoTracks();
  if (!videoTracks.length) return;

  isCameraEnabled = !isCameraEnabled;

  videoTracks.forEach((track) => {
    track.enabled = isCameraEnabled;
  });

  setStatusText(isCameraEnabled ? "Camera on ✅" : "Camera off");
}

function safeOn(id, ev, fn) {
  const el = document.getElementById(id);
  if (el) el.addEventListener(ev, fn);
}

function makeChatPanelDraggable() {
  const chatHolder = document.querySelector(".chat-holder");
  if (!chatHolder) return;

  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  chatHolder.addEventListener("mousedown", (e) => {
    isDragging = true;
    chatHolder.classList.add("dragging");

    const rect = chatHolder.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    chatHolder.style.left = `${rect.left}px`;
    chatHolder.style.top = `${rect.top}px`;
    chatHolder.style.bottom = "auto";
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    let x = e.clientX - offsetX;
    let y = e.clientY - offsetY;

    const maxX = window.innerWidth - chatHolder.offsetWidth;
    const maxY = window.innerHeight - chatHolder.offsetHeight;

    x = Math.max(0, Math.min(x, maxX));
    y = Math.max(0, Math.min(y, maxY));

    chatHolder.style.left = `${x}px`;
    chatHolder.style.top = `${y}px`;
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
    chatHolder.classList.remove("dragging");
  });
}

function logout() {
  try {
    window.location.href = "/login";
  } catch (e) {
    console.warn("Logout redirect failed:", e);
  }
}

window.logout = logout;

document.addEventListener("DOMContentLoaded", async () => {
  try {
    await initVideoOnce();
  } catch (e) {
    setStatusText("Permission required ❌ (camera)");
    setDot(false);
    console.warn(e);
  }

  await init3DAvatar();
  makeChatPanelDraggable();

  const userEl = document.getElementById("userName");
  if (userEl && userEl.textContent.trim() === "") {
    userEl.textContent = "User";
  }

  safeOn("recordUploadBtn", "click", toggleContinuousConversation);
  safeOn("testBtn", "click", testBackend);
  safeOn("cameraToggleTop", "click", toggleCamera);
  safeOn("cameraToggleBottom", "click", toggleCamera);

  const micBtn = document.getElementById("micToggle");
  if (micBtn) {
    micBtn.addEventListener("click", () => {
      showSystemMessage("Microphone is used automatically during REC mode.");
    });
  }

  setStatusText("Ready");
  setDot(true);
});
</script>
